
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hyprland.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

autogenerated = 0 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

xwayland {
	force_zero_scaling = true
}

debug {
	disable_logs = true
}

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
#monitor=,preferred,auto,auto
monitor=HDMI-A-1,preferred,auto,1.00

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
# $terminal = kitty
# $fileManager = dolphin
# $menu = wofi --show drun
$terminal = alacritty
$fileManager = dolphin
$menu = rofi -show drun
$browser = zen


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox

# Core UI stuff
exec-once = waybar
exec-once = swaync
exec-once = hyprsunset
exec-once = hyprpaper
exec-once = sleep 2 && /home/benallen/bin/rotate-wallpaper configonly # sets a new wallpaper for next time

# Daemons
exec-once = playerctld daemon
exec-once = pipewire
exec-once = wireplumber

# WM Event handlers
exec-once = /home/benallen/.config/hypr/scripts/event-socket-monitor.sh

# Screen capture fix
exec-once = /home/benallen/.config/hypr/scripts/xdph-nuke.sh

# Env config
exec-once = /home/benallen/.config/hypr/scripts/tmux-env.sh tmux

# Autostart apps
exec-once = /home/benallen/bin/streamcontroller -b
exec-once = udiskie --tray
exec-once = steam -silent

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
# Used flags:
#
# Flag	Name				Description
# l		locked				Will also work when an input inhibitor is active.
# e		repeat				Will repeat when held.
# m		mouse				See the dedicated Mouse Binds section.
# u		submap universal	Will be active no matter the submap.

#  ── Always-active binds ───────────────────────────────────────────────────

bindu = $mainMod, RETURN, exec, $terminal
bindu = SUPER, B, exec, $browser
bindu = SUPER_SHIFT, B, exec, $browser
bindu = $mainMod, Q, killactive,
bindu = SUPER_SHIFT, Q, forcekillactive,
bindu = $mainMod, F, fullscreen,
bindu = $mainMod, V, togglefloating,

# Switch workspaces with mainMod + [0-9]
bindu = $mainMod, 1, workspace, 1
bindu = $mainMod, 2, workspace, 2
bindu = $mainMod, 3, workspace, 3
bindu = $mainMod, 4, workspace, 4
bindu = $mainMod, 5, workspace, 5
bindu = $mainMod, 6, workspace, 6
bindu = $mainMod, 7, workspace, 7
bindu = $mainMod, 8, workspace, 8
bindu = $mainMod, 9, workspace, 9
bindu = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bindu = $mainMod SHIFT, 1, movetoworkspace, 1
bindu = $mainMod SHIFT, 2, movetoworkspace, 2
bindu = $mainMod SHIFT, 3, movetoworkspace, 3
bindu = $mainMod SHIFT, 4, movetoworkspace, 4
bindu = $mainMod SHIFT, 5, movetoworkspace, 5
bindu = $mainMod SHIFT, 6, movetoworkspace, 6
bindu = $mainMod SHIFT, 7, movetoworkspace, 7
bindu = $mainMod SHIFT, 8, movetoworkspace, 8
bindu = $mainMod SHIFT, 9, movetoworkspace, 9
bindu = $mainMod SHIFT, 0, movetoworkspace, 10

# Media keys, requires pactl and playerctl
bindelu = ,XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +10%
bindelu = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -10%
bindelu = ,XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindelu = ,XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

bindlu = , XF86AudioNext, exec, playerctl next
bindlu = , XF86AudioPause, exec, playerctl play-pause
bindlu = , XF86AudioPlay, exec, playerctl play-pause
bindlu = , XF86AudioPrev, exec, playerctl previous

#  ── Gaming submap ─────────────────────────────────────────────────────────

submap = gaming
unbind = CTRL, SPACE # Rofi
unbind = $mainMod, W # Wallpaper rotation

bind = $mainMod, G, submap, reset

submap = reset
bind = $mainMod, G, submap, gaming

#  ── Active only in normal key mode ────────────────────────────────────────

bind = CTRL, SPACE, exec, $menu
bind = SUPER_SHIFT, S, exec, hyprshot --mode region --clipboard-only
bind = $mainMod, M, exit,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, O, togglesplit, # dwindle
bind = $mainMod, W, exec, $HOME/bin/rotate-wallpaper

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = SUPER_SHIFT, h, movewindow, l
bind = SUPER_SHIFT, l, movewindow, r
bind = SUPER_SHIFT, k, movewindow, u
bind = SUPER_SHIFT, j, movewindow, d

# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
# Move/resize windows with TAB + SHIFT/CTRL and dragging
bindm = SHIFT, TAB, movewindow
bindm = CTRL, TAB, resizewindow


