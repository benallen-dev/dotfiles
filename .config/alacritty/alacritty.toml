[general]
import = ["~/.config/alacritty/themes/themes/gruvbox_dark.toml"]

[font]
size = 16

[font.bold]
family = "NotoSansM Nerd Font Mono"
style = "SemiBold"

# italic? yes!
[font.bold_italic]
family = "CaskaydiaMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "CaskaydiaMono Nerd Font Mono"
style = "Italic"

[font.normal]
family = "NotoMono Nerd Font Mono"
style = "Regular"

[window]
option_as_alt = "Both"
dynamic_padding = true
opacity = 0.85
blur = true

[window.padding]
x = 4
y = 4
